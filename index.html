<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <title>World Clock - Tirelle Peter</title>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>

      <select name="" id="">
        <option value="">Select a City</option>
        <option value="">London 🇬🇧</option>
        <option value="">New York 🇺🇸</option>
        <option value="">Johanessburg 🇿🇦</option>
      </select>

      <div class="city">
        <div>
          <h2>Los Angeles 🇺🇸</h2>
          <div class="date">April 30th 2026</div>
        </div>
        <div class="time">6:37:45 <small>PM</small></div>
      </div>

      <div class="city">
        <div>
          <h2>Paris 🇫🇷</h2>
          <div class="date">April 30th 2026</div>
        </div>
        <div class="time">6:37:45 <small>PM</small></div>
      </div>
    </div>

    <footer>
      This is a project coded by 🦖 <strong>Tirelle Peter</strong> and is
      <a href="https://github.com/shortstack8/world-clock" target="_blank">
        open sourced on Github</a
      >
    </footer>
    <script src="javascript/index.js"></script>
  </body>
</html>
